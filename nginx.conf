events{}
http{

    include mime.types;

    server{
        listen 443 ssl http2;
        server_name motoparts.sbs www.motoparts.sbs
        root /usr/share/nginx/html;
        index index.html;

        ssl_certificate /etc/letsencrypt/live/motoparts.sbs/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/motoparts.sbs/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;

        # Main React app
        location / {
            try_files $uri /index.html;
        }
    }
}